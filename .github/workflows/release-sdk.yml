name: release-sdk

on:
  push:
    tags:
      - "web-agent-sdk-v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to validate/publish (for example web-agent-sdk-v0.2.1)"
        required: false
        type: string
        default: ""
      publish:
        description: "Publish to PyPI"
        required: false
        type: boolean
        default: false

jobs:
  build_and_check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install release tooling
        run: python -m pip install --upgrade pip build twine

      - name: Build and validate SDK artifacts
        env:
          RELEASE_TAG: ${{ github.event_name == 'push' && github.ref_name || inputs.release_tag }}
        run: bash ./scripts/release_sdk.sh

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-agent-sdk-dist
          path: sdk/python/dist/*
          if-no-files-found: error

  publish:
    needs: build_and_check
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.publish && inputs.release_tag != '')
    runs-on: ubuntu-latest
    environment:
      name: pypi
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: web-agent-sdk-dist
          path: dist

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Twine
        run: python -m pip install --upgrade pip twine

      - name: Publish to PyPI with token
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.TWINE_API_TOKEN }}
        run: python -m twine upload dist/*
