name: pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Pages artifact
        run: |
          mkdir -p _site/docs/assets
          cp docs/application-document.html _site/application-document.html
          cp docs/application-document.html _site/architecture.html
          cp docs/application-document.html _site/index.html
          cp docs/assets/readme-backend-sdk-workflow.svg _site/docs/assets/readme-backend-sdk-workflow.svg
          touch _site/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
