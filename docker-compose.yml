services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: web_agent
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d web_agent"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DEEP_RESEARCH_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/web_agent
      OPENAI_API_KEY: ${OPENAI_API_KEY:?OPENAI_API_KEY is required}
      SERPER_API_KEY: ${SERPER_API_KEY:?SERPER_API_KEY is required}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      PORT: "3000"
      AGENT_BACKEND_ORIGIN: http://backend:8000
      SERPER_API_KEY: ${SERPER_API_KEY:?SERPER_API_KEY is required}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
